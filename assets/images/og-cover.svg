<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F7FB"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B7CFF"/>
      <stop offset="100%" stop-color="#7B94FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B7CFF"/>
      <stop offset="100%" stop-color="#00C896"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="100" cy="100" r="280" fill="#C7D6FF" opacity="0.45" filter="url(#blur1)"/>
  <circle cx="1100" cy="530" r="220" fill="#B8F0E2" opacity="0.45" filter="url(#blur1)"/>
  <circle cx="900" cy="80" r="160" fill="#DDD6FE" opacity="0.35" filter="url(#blur1)"/>

  <!-- Logo pill -->
  <rect x="80" y="64" width="180" height="44" rx="22" fill="url(#primary)" opacity="0.12"/>
  <text x="170" y="92" font-family="'Sora', 'Inter', sans-serif" font-size="18" font-weight="700" fill="#5B7CFF" text-anchor="middle">BewerbZen</text>

  <!-- Main headline -->
  <text x="80" y="210" font-family="'Sora', 'Inter', sans-serif" font-size="68" font-weight="800" fill="#111827" letter-spacing="-2">Найди работу.</text>
  <text x="80" y="295" font-family="'Sora', 'Inter', sans-serif" font-size="68" font-weight="800" fill="#5B7CFF" letter-spacing="-2">Без бумажного ада.</text>

  <!-- Subtitle -->
  <text x="80" y="365" font-family="'Inter', sans-serif" font-size="26" font-weight="400" fill="#6B7280">AI-генератор Bewerbung для русскоязычных в Германии.</text>
  <text x="80" y="400" font-family="'Inter', sans-serif" font-size="26" font-weight="400" fill="#6B7280">Anschreiben + Lebenslauf за 8 минут. ATS-оптимизировано.</text>

  <!-- Stats row -->
  <rect x="80" y="460" width="200" height="80" rx="16" fill="white" opacity="0.85"/>
  <text x="180" y="494" font-family="'Sora', 'Inter', sans-serif" font-size="32" font-weight="700" fill="#5B7CFF" text-anchor="middle">8 мин</text>
  <text x="180" y="520" font-family="'Inter', sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">на Bewerbung</text>

  <rect x="300" y="460" width="200" height="80" rx="16" fill="white" opacity="0.85"/>
  <text x="400" y="494" font-family="'Sora', 'Inter', sans-serif" font-size="32" font-weight="700" fill="#00C896" text-anchor="middle">3 бесп.</text>
  <text x="400" y="520" font-family="'Inter', sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">бесплатно</text>

  <rect x="520" y="460" width="200" height="80" rx="16" fill="white" opacity="0.85"/>
  <text x="620" y="494" font-family="'Sora', 'Inter', sans-serif" font-size="32" font-weight="700" fill="#5B7CFF" text-anchor="middle">ATS ✓</text>
  <text x="620" y="520" font-family="'Inter', sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">оптимизировано</text>

  <!-- Right side card mockup -->
  <rect x="820" y="160" width="310" height="340" rx="24" fill="white" opacity="0.95" filter="drop-shadow(0 20px 60px rgba(0,0,0,0.10))"/>
  <!-- Card content -->
  <circle cx="870" cy="216" r="22" fill="url(#primary)"/>
  <text x="870" y="223" font-family="'Sora', sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">AL</text>
  <text x="906" y="210" font-family="'Sora', sans-serif" font-size="14" font-weight="600" fill="#111827">Alex Lammers</text>
  <text x="906" y="228" font-family="'Inter', sans-serif" font-size="12" fill="#9CA3AF">Frontend Developer</text>

  <rect x="848" y="252" width="254" height="60" rx="12" fill="#F0FDF9"/>
  <text x="876" y="277" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#00C896">📄 Bewerbung готов</text>
  <text x="876" y="298" font-family="'Inter', sans-serif" font-size="11" fill="#9CA3AF">ATS — OK · 92% совпадение</text>

  <text x="848" y="336" font-family="'Inter', sans-serif" font-size="11" fill="#9CA3AF">⏱ 8 минут</text>

  <rect x="848" y="350" width="78" height="26" rx="13" fill="rgba(91,124,255,0.1)"/>
  <text x="887" y="368" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#5B7CFF" text-anchor="middle">ATS ✓</text>

  <rect x="934" y="350" width="68" height="26" rx="13" fill="rgba(0,200,150,0.1)"/>
  <text x="968" y="368" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#00A87B" text-anchor="middle">PDF готов</text>

  <rect x="848" y="430" width="254" height="44" rx="14" fill="url(#primary)"/>
  <text x="975" y="458" font-family="'Sora', sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Подготовить бесплатно →</text>

  <!-- Bottom domain -->
  <text x="1120" y="590" font-family="'Sora', sans-serif" font-size="16" font-weight="600" fill="#9CA3AF" text-anchor="end">bewerbzen.de</text>
</svg>
