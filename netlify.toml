[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/api/bz-analytics/*"
  to = "http://46.225.170.55:3466/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/bot"
  to   = "https://t.me/BewerbZen_bot"
  status = 302

[[redirects]]
  from = "/start"
  to   = "https://t.me/BewerbZen_bot"
  status = 302

[[redirects]]
  from = "/channel"
  to   = "https://t.me/BewerbZen"
  status = 302
